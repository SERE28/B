<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Catálogo de Lectura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Mi Espacio de Lectura</h1>
  <a href="añadir.html" class="btn-nav">+ Añadir Libro</a>
  <form id="buscador-avanzado" onsubmit="event.preventDefault();">
    <select id="search-criterio">
      <option value="all">Buscar en todo</option>
      <option value="title">Por Título</option>
      <option value="author">Por Autor</option>
      <option value="category">Por Género</option>
    </select>
    <input type="search" id="search-input" placeholder="Escribe para buscar...">
  </form>
</header>

<main class="dashboard">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="manga">Mangas</button>
    <button class="filter-btn" data-filter="manhwa">Manhwas</button>
    <button class="filter-btn" data-filter="novela">Novelas Ligeras</button>
    <button class="filter-btn" data-filter="libro">Libros</button>
  </div>

  <section class="content-layout">
    <div id="book-container">
      <h2>Mi Lista</h2>
      <div id="book-list" class="book-grid">
        <p class="empty">Cargando tu colección…</p>
      </div>
    </div>
  </section>
</main>

<!-- Modal de Edición (Nube Flotante Dividida) -->
<div id="modal-edicion" class="modal-overlay">
  <div class="modal-content">
    <button id="btn-cerrar-modal" class="btn-cerrar">✕</button>
    
    <!-- LADO IZQUIERDO: Previsualización -->
    <div class="modal-preview">
      <div id="preview-card" style="width: 200px; height: 280px; background: #eee; border-radius: 8px; overflow:hidden; border: 1px solid #d7ccc8;">
        <img id="preview-img" src="https://placehold.co/200x280" style="width:100%; height:100%; object-fit:cover;" alt="Portada">
      </div>
      <h3 id="preview-title" style="margin-top: 15px; text-align: center; color: var(--color-texto-dark); font-size: 1rem; width: 200px;">Título</h3>
    </div>

    <!-- LADO DERECHO: Formulario -->
   <div class="modal-form-side">
  <fieldset>
    <legend id="form-legend">Registrar Nueva Lectura</legend>
    <form id="form-libros">
      <input type="hidden" id="isbn_original" name="isbn_original">

      <label for="titulo">Título</label>
      <input type="text" id="titulo" name="titulo" required placeholder="Ej: One Piece">

      <label for="autor">Autor / Ilustrador</label>
      <input type="text" id="autor" name="autor" required placeholder="Ej: Eiichiro Oda">

      <label for="categoria">Géneros / Etiquetas</label>
      <input type="text" id="categoria" name="categoria" required placeholder="Ej: Shonen, Aventura">

      <div class="form-row">
        <div>
          <label for="type">Formato</label>
          <select id="type" name="type" required>
            <option value="manga">Manga</option>
            <option value="manhwa">Manhwa</option>
            <option value="novela">Novela Ligera</option>
            <option value="libro">Libro Tradicional</option>
          </select>
        </div>
        <div>
          <label for="status">Estado</label>
          <select id="status" name="status" required>
            <option value="pendiente">Pendiente</option>
            <option value="leyendo" selected>Leyendo</option>
            <option value="terminado">Terminado</option>
            <option value="abandonado">Abandonado</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="progress">Progreso</label>
          <input type="text" id="progress" name="progress" placeholder="Ej: Cap 45">
        </div>
        <div>
          <label for="rating">Nota</label>
          <select id="rating" name="rating">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
          </select>
        </div>
      </div>

      <label for="coverUrl">Enlace de la Portada (URL)</label>
      <input type="url" id="coverUrl" name="coverUrl" placeholder="https://ejemplo.com/imagen.jpg">

      <label for="readUrl">Enlace para Leer (URL)</label>
      <input type="url" id="readUrl" name="readUrl" placeholder="https://tu-web-de-lectura.com">

      <label for="isbn">ID Interno / ISBN</label>
      <input type="text" id="isbn" name="isbn" placeholder="Opcional">

      <div class="form-actions">
        <button type="submit" id="btn-submit-form">Guardar en mi Colección</button>
        <button type="button" id="btn-cancelar-edicion" class="btn-cancelar" style="display:none;">Cancelar Edición</button>
        <button type="button" id="btn-eliminar-libro" class="btn-eliminar" style="display:none;">Eliminar Libro</button>
      </div>
  </fieldset>
</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
