<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Mi Notion Verde</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <div class="app-shell">

            <!-- TOP BAR -->
            <header class="topbar">
                <div class="topbar-left">
                    <span class="topbar-title">Mi Notion Verde</span>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn">Buscar</button>
                    <div class="topbar-avatar">?</div>
                </div>
            </header>

            <div class="app-layout">

                <!-- SIDEBAR -->
                <aside class="sidebar">
                    <nav class="sidebar-section">
                        <a href="biblioteca/frontend/index.html"
                            class="sidebar-link">📚 Mi biblioteca</a>
                        <a href="#" class="sidebar-link">🎵 Mi playlist</a>
                        <a href="#" class="sidebar-link">📺 Series</a>
                        <a href="#" class="sidebar-link">🎮 Juegos</a>
                    </nav>
                </aside>

                <!-- DRAG LATERAL -->
                <div class="horizontal-divider"></div>

                <!-- PAGE WRAPPER -->
                <div class="page-wrapper">

                    <!-- COVER -->
                    <div class="header-cover">
                        <img
                            src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1600&q=80">
                    </div>

                    <!-- PAGE HEADER -->
                    <section class="page-header">
                        <div class="page-icon">🌿</div>
                        <div class="page-header-text">
                            <h1>Mi Notion Verde</h1>
                            <p class="page-subtitle">Un espacio tranquilo para
                                organizar mi vida</p>
                        </div>
                    </section>

                    <!-- PAGE CONTENT -->
                    <main class="page-content">

                        <!-- BLOQUE 1 -->
                        <div class="resizable-block vertical">
                            <section id="bloque-biblioteca"
                                class="block"></section>
                            <div class="vertical-divider"></div>
                        </div>

                        <!-- BLOQUE 2 — TAREAS -->
                        <div class="resizable-block vertical">
                            <section class="block block-todos">

                                <div class="block-header">
                                    <h3>✅ Tareas de hoy</h3>

                                    <div class="block-header-actions">
                                        <button class="block-menu-btn"
                                            id="menu-bloque-tareas">⋯</button>
                                        <button id="btn-add-tarea"
                                            class="btn-add">+</button>
                                    </div>
                                </div>

                                <ul class="todo-list"></ul>
                            </section>

                            <div class="vertical-divider"></div>
                        </div>

                        <!-- BLOQUE 3 — TABLA -->
                        <div class="resizable-block vertical">
                            <section class="block block-table">
                                <div class="block-header">
                                    <h3>📖 Lecturas actuales</h3>
                                </div>

                                <table class="tabla-lecturas">
                                    <thead>
                                        <tr>
                                            <th>Título</th>
                                            <th>Estado</th>
                                            <th>Notas</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-lecturas"></tbody>
                                </table>
                            </section>
                        </div>

                    </main>

                </div>
            </div>
        </div>

        <!-- CAPA PARA MENÚS FLOTANTES -->
        <div id="menu-layer"></div>

        <script src="app.js"></script>
    </body>

</html>
