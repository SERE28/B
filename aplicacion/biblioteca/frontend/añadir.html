<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Añadir Nueva Lectura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-añadir">

<header>
  <h1>Registrar Nueva Lectura</h1>
  <a href="index.html" class="btn-nav">Volver al Inicio</a>
</header>

<main class="content-layout">
  <div class="modal-content">
    
    <div class="modal-preview">
      <div id="preview-card" style="width: 200px; height: 280px; background: #eee; border-radius: 12px; overflow: hidden; border: 1px solid var(--color-borde);">
        <img id="preview-img" src="https://placehold.co/200x280?text=Sin+Portada" style="width: 100%; height: 100%; object-fit: cover;" alt="Portada">
      </div>
      <h3 id="preview-title" style="margin-top: 15px; text-align: center; color: var(--color-texto-dark); font-size: 1rem; width: 200px;">Nuevo Libro</h3>
    </div>

    <div class="modal-form-side minimal-form" style="flex: 1;">
      <fieldset>
        <legend id="form-legend">Detalles de la Colección</legend>
        <form id="form-añadir">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" required placeholder="Ej: One Piece">

          <label for="autor">Autor / Ilustrador</label>
          <input type="text" id="autor" name="autor" required placeholder="Ej: Eiichiro Oda">

          <label for="categoria">Géneros / Etiquetas</label>
          <input type="text" id="categoria" name="categoria" required placeholder="Ej: Shonen, Aventura">
          
          <label for="coverUrl">Enlace de la Portada (URL)</label>
          <input type="url" id="coverUrl" name="coverUrl" placeholder="https://ejemplo.com/imagen.jpg">

          <label for="type">Formato</label>
          <select id="type" name="type" required>
            <option value="manga">Manga</option>
            <option value="manhwa">Manhwa</option>
            <option value="novela">Novela Ligera</option>
            <option value="libro">Libro Tradicional</option>
          </select>

          <label for="status">Estado</label>
          <select id="status" name="status" required>
            <option value="pendiente">Pendiente</option>
            <option value="leyendo" selected>Leyendo</option>
            <option value="terminado">Terminado</option>
            <option value="abandonado">Abandonado</option>
          </select>

          <label for="isbn">ID Interno / ISBN</label>
          <input type="text" id="isbn" name="isbn" required>

          <button type="submit" id="btn-submit-form">Guardar en mi Colección</button>
        </form>
      </fieldset>
    </div>
  </div>
</main>

<script src="añadir.js"></script>
</body>
</html>
