<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados de Búsqueda | Biblioteca Personal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>Resultados de Búsqueda</h1>
    <nav style="margin-top: 10px;">
      <a href="index.html" class="btn-nav">Volver al Inicio</a>
    </nav>
  </div>

  <form id="buscador-avanzado" action="busqueda.html" method="get">
    
    <select name="criterio" id="search-criterio">
      <option value="all">Todo</option>
      <option value="title">Título</option>
      <option value="author">Autor</option>
      <option value="category">Género</option>
    </select>

    <input type="search" name="q" id="search-input" placeholder="Buscar..." required>
    
    <button type="submit" class="btn-nav">Buscar</button>
  </form>
</header>

<main class="content-layout">
  <h2 id="titulo-resultados" style="margin-bottom: 25px; color: var(--accent-color);"></h2>
  
  <div id="book-list" class="book-grid">
    <p class="empty">Buscando libros en la colección…</p>
  </div>
</main>

<div id="modal-edicion" class="modal-overlay">
  <div class="modal-content">
    <button id="btn-cerrar-modal" class="btn-cerrar">✕</button>
    
    <div class="modal-preview">
      <div id="preview-card" style="width: 200px; height: 280px; background: #eee; border-radius: 8px; overflow:hidden; border: 1px solid #d7ccc8;">
        <img id="preview-img" src="https://placehold.co/200x280" style="width:100%; height:100%; object-fit:cover;" alt="Portada">
      </div>
      <h3 id="preview-title" style="margin-top: 15px; text-align: center; color: var(--color-texto-dark); font-size: 1rem; width: 200px;">Título</h3>
    </div>

    <div class="modal-form-side">
      <form id="form-libros">
        <input type="hidden" id="isbn_original" name="isbn_original">

        <label for="titulo">Título</label>
        <input type="text" id="titulo" name="titulo" required>

        <label for="autor">Autor / Ilustrador</label>
        <input type="text" id="autor" name="autor" required>

        <label for="categoria">Géneros / Etiquetas</label>
        <input type="text" id="categoria" name="categoria">

        <div class="form-row">
            <div>
              <label for="type">Formato</label>
              <select id="type" name="type">
                <option value="manga">Manga</option>
                <option value="manhwa">Manhwa</option>
                <option value="novela">Novela Ligera</option>
                <option value="libro">Libro Tradicional</option>
              </select>
            </div>
            <div>
              <label for="status">Estado</label>
              <select id="status" name="status">
                <option value="pendiente">Pendiente</option>
                <option value="leyendo">Leyendo</option>
                <option value="terminado">Terminado</option>
              </select>
            </div>
        </div>

        <label for="coverUrl">Enlace de la Portada (URL)</label>
        <input type="url" id="coverUrl" name="coverUrl">

        <label for="isbn">ID Interno / ISBN</label>
        <input type="text" id="isbn" name="isbn" required>

        <div class="form-actions">
          <button type="submit" id="btn-submit-form">Guardar en mi Colección</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="busqueda.js"></script>
</body>
</html>
